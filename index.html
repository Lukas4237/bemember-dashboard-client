<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1546b9" />
    <title>BeMember Dashboard</title>
    <link rel="stylesheet" href="./styles.css?v=20260719-reward-type-local-12" />
  <link rel="stylesheet" href="dashboard-final-fixes.css?v=20260719-popup-local-3">
</head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar" id="sidebar" aria-label="Hauptnavigation">
        <a class="brand" href="#zuhause" aria-label="BeMember Zuhause">
          <span class="brand-wordmark" aria-hidden="true">
            <span class="brand-rings"></span>
            <span class="brand-name">BeMember</span>
          </span>
        </a>

        <nav class="primary-nav" aria-label="Bereiche">
          <button class="nav-item" type="button" data-route="zuhause">
            <i data-lucide="house"></i><span>Zuhause</span><i class="nav-chevron" data-lucide="chevron-right"></i>
          </button>
          <button class="nav-item" type="button" data-route="bestellungen">
            <i data-lucide="shopping-bag"></i><span>Bestellungen</span><i class="nav-chevron" data-lucide="chevron-right"></i>
          </button>
          <button class="nav-item" type="button" data-route="kunden">
            <i data-lucide="user-round"></i><span>Kunden</span><i class="nav-chevron" data-lucide="chevron-right"></i>
          </button>
          <button class="nav-item nav-parent" id="appNavToggle" type="button" aria-expanded="true">
            <i data-lucide="smartphone"></i><span>App</span><i class="nav-chevron" data-lucide="chevron-down"></i>
          </button>
          <div class="subnav" id="appSubnav">
            <button type="button" data-route="belohnungen">Belohnungen<i data-lucide="chevron-right"></i></button>
            <button type="button" data-route="produkte">Behandlungen/Produkte<i data-lucide="chevron-right"></i></button>
            <button type="button" data-route="mitgliedschaft">Mitgliedschaft<i data-lucide="chevron-right"></i></button>
            <button type="button" data-route="kommunikation">Neuigkeiten/Nachrichten<i data-lucide="chevron-right"></i></button>
            <button type="button" data-route="medien">Medien<i data-lucide="chevron-right"></i></button>
            <button type="button" data-route="einstellungen">Einstellungen<i data-lucide="chevron-right"></i></button>
          </div>
          <button class="nav-item" type="button" data-route="auszahlungen">
            <i data-lucide="credit-card"></i><span>Auszahlungen</span><i class="nav-chevron" data-lucide="chevron-right"></i>
          </button>
        </nav>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <button class="icon-button mobile-menu" id="mobileMenu" type="button" aria-label="Navigation öffnen">
            <i data-lucide="menu"></i>
          </button>
          <label class="global-search">
            <i data-lucide="search"></i>
            <input id="globalSearch" type="search" placeholder="Suchen" autocomplete="off" />
          </label>
          <button class="profile-button" id="profileButton" type="button" aria-haspopup="dialog">
            <span>Anna Meyer</span>
            <span class="profile-avatar"><i data-lucide="user-round"></i></span>
          </button>
        </header>

        <main class="content" id="mainContent" tabindex="-1"></main>
      </div>
    </div>

    <button class="sidebar-scrim" id="sidebarScrim" type="button" aria-label="Navigation schließen" hidden></button>

    <div class="modal-layer" id="modalLayer" hidden>
      <button class="modal-backdrop" id="modalBackdrop" type="button" aria-label="Dialog schließen"></button>
      <section class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"></section>
    </div>

    <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

    <script src="./assets/vendor/lucide.min.js"></script>
    <script src="./app.js?v=20260719-reward-type-local-12"></script>
  <script src="dashboard-final-fixes.js?v=20260719-align-local-9"></script>
</body>
</html>
